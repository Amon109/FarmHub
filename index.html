<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌾 FarmHub – กราฟราคาพืชผลไทย</title>
  <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js)"></script>
  <style>
    body {
      margin: 0;
      font-family: "Prompt", sans-serif;
      background: #f1f8f2;
      color: #333;
      text-align: center;
    }
    header {
      background: linear-gradient(90deg, #2e7d32, #81c784);
      color: #fff;
      padding: 12px;
      font-size: 1.5em;
      font-weight: 600;
      margin-bottom: 20px;
    }
    section {
      max-width: 900px;
      margin: auto;
      padding: 10px;
    }
    canvas {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-bottom: 40px;
    }
    footer {
      background: #388e3c;
      color: #fff;
      padding: 8px 0;
      font-size: 0.9em;
    }
  </style>
</head>

<body>
  <header>🌾 FarmHub – กราฟราคาพืชผลไทย 🌽</header>
  <section>
    <h2>ราคาข้าวเปลือก (บาท/ตัน)</h2>
    <canvas id="riceChart"></canvas>

    <h2>ราคามันสำปะหลัง (บาท/กก.)</h2>
    <canvas id="cassavaChart"></canvas>

    <h2>ราคายางพารา (บาท/กก.)</h2>
    <canvas id="rubberChart"></canvas>
  </section>
  <footer>ข้อมูลจำลองเพื่อการสาธิต | © 2024 FarmHub</footer>

  <script>
    // ข้อมูลราคาจำลอง (เช่นสัปดาห์หรือเดือนย้อนหลัง)
    const labels = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย."];

    const riceData = [9500, 9700, 9400, 9800, 10100, 10400];
    const cassavaData = [2.2, 2.1, 2.3, 2.25, 2.4, 2.35];
    const rubberData = [65, 68, 70, 67, 72, 74];

    // ฟังก์ชันสร้างกราฟ
    function createLineChart(canvasId, label, data, color) {
      new Chart(document.getElementById(canvasId), {
        type: "line",
        data: {
          labels: labels,
          datasets: [{
            label,
            data,
            borderColor: color,
            backgroundColor: color + "33",
            tension: 0.3,
            fill: true,
            pointRadius: 4,
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false }
          },
          scales: {
            x: { title: { display: true, text: "เดือน" } },
            y: { beginAtZero: false }
          }
        }
      });
    }

    // สร้างกราฟแต่ละประเภทสินค้า
    createLineChart("riceChart", "ราคาข้าวเปลือก", riceData, "#4CAF50");
    createLineChart("cassavaChart", "ราคามันสำปะหลัง", cassavaData, "#FF9800");
    createLineChart("rubberChart", "ราคายางพารา", rubberData, "#2196F3");
  </script>
</body>
</html>
