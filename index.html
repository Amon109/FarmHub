<script>
// 1. ข้อมูลสินค้า
const products = [
    { id: 'rice',    name: '🌾 ข้าวหอมมะลิ',  price: 15800, change: 2.5,  unit: 'บาท/ตัน' },
    { id: 'rice2',   name: '🌾 ข้าวขาว 5%',    price: 14200, change: 1.8,  unit: 'บาท/ตัน' },
    { id: 'rubber',  name: '🌳 ยางพารา',        price: 52.5,  change: -1.2, unit: 'บาท/กก.' },
    { id: 'palm',    name: '🌴 ปาล์มน้ำมัน',    price: 5.8,   change: 0.5,  unit: 'บาท/กก.' },
    { id: 'sugar',   name: '🍬 อ้อย',           price: 1050,  change: -0.8, unit: 'บาท/ตัน' },
    { id: 'cassava', name: '🥔 มันสำปะหลัง',    price: 2.85,  change: 3.2,  unit: 'บาท/กก.' },
    { id: 'corn',    name: '🌽 ข้าวโพด',        price: 8.9,   change: 1.1,  unit: 'บาท/กก.' },
    { id: 'durian',  name: '🍈 ทุเรียน',        price: 180,   change: -2.5, unit: 'บาท/กก.' },
    { id: 'mango',   name: '🥭 มะม่วง',         price: 45,    change: 4.2,  unit: 'บาท/กก.' },
    { id: 'shrimp',  name: '🦐 กุ้งขาว',        price: 145,   change: -0.5, unit: 'บาท/กก.' },
    { id: 'chicken', name: '🐔 ไก่เนื้อ',        price: 42,    change: 0.8,  unit: 'บาท/กก.' },
    { id: 'pork',    name: '🐷 หมูเนื้อแดง',    price: 135,   change: -1.5, unit: 'บาท/กก.' },
];

let currentProduct = products[0];
let priceChart = null;
let volumeChart = null;
let currentTimeframe = '1W';
let currentChartType = 'line';

// 2. ฟังก์ชันช่วยคำนวณต่างๆ
function seededRandom(seed) {
    let s = seed;
    return function() {
        s = (s * 9301 + 49297) % 233280;
        return s / 233280;
    };
}

function generatePriceData(basePrice, days) {
    const rand = seededRandom(basePrice * days);
    const labels = [];
    const data = [];
    let price = basePrice * 0.95;
    const now = new Date();
    for (let i = days; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        labels.push(d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }));
        price += (rand() - 0.48) * (basePrice * 0.02);
        data.push(Math.round(price * 100) / 100);
    }
    return { labels, data };
}

function calculateMA(data, period) {
    return data.map((_, i) => {
        if (i < period - 1) return null;
        const slice = data.slice(i - period + 1, i + 1);
        return Math.round((slice.reduce((a, b) => a + b, 0) / period) * 100) / 100;
    });
}

// 3. ฟังก์ชันอัปเดต UI
function renderProductList() {
    document.getElementById('productList').innerHTML = products.map(p => `
        <li class="product-item ${p.id === currentProduct.id ? 'active' : ''}" onclick="selectProduct('${p.id}')">
            <div>
                <div class="product-name">${p.name}</div>
                <div style="font-size:11px;color:#8b949e">${p.unit}</div>
            </div>
            <div style="text-align:right">
                <div style="font-size:14px" class="${p.change >= 0 ? 'price-up' : 'price-down'}">${p.price.toLocaleString()}</div>
                <span class="price-change ${p.change >= 0 ? 'change-up' : 'change-down'}">${p.change >= 0 ? '+' : ''}${p.change}%</span>
            </div>
        </li>
    `).join('');
}

function updateHeader() {
    const isUp = currentProduct.change >= 0;
    document.getElementById('currentProductName').textContent = currentProduct.name;
    document.getElementById('currentPrice').textContent = `฿${currentProduct.price.toLocaleString()}`;
    document.getElementById('currentPrice').className = `current-price ${isUp ? 'price-up' : 'price-down'}`;
    document.getElementById('priceChange').textContent = `${isUp ? '+' : ''}${currentProduct.change}%`;
    document.getElementById('priceChange').className = `price-change ${isUp ? 'change-up' : 'change-down'}`;
}

// 4. ระบบจัดการกราฟ
function updateChart() {
    const daysMap = { '1D': 10, '1W': 20, '1M': 40, '3M': 60, '1Y': 100 };
    const points = daysMap[currentTimeframe];
    const { labels, data } = generatePriceData(currentProduct.price, points);
    
    const isUp = currentProduct.change >= 0;
    const mainColor = isUp ? '#3fb950' : '#f85149';

    if (priceChart) priceChart.destroy();
    const ctx = document.getElementById('priceChart').getContext('2d');
    priceChart = new Chart(ctx, {
        type: currentChartType,
        data: {
            labels,
            datasets: [
                { label: 'ราคาปัจจุบัน', data, borderColor: mainColor, backgroundColor: mainColor + '22', fill: true, tension: 0.4, pointRadius: 0 },
                { label: 'MA 7', data: calculateMA(data, 7), borderColor: '#f0883e', borderDash: [5, 5], fill: false, pointRadius: 0, tension: 0.4 },
                { label: 'MA 25', data: calculateMA(data, 25), borderColor: '#a371f7', borderDash: [5, 5], fill: false, pointRadius: 0, tension: 0.4 }
            ]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            animation: { duration: 1000 },
            scales: { x: { grid: { display: false } }, y: { position: 'right' } }
        }
    });

    if (volumeChart) volumeChart.destroy();
    const vCtx = document.getElementById('volumeChart').getContext('2d');
    volumeChart = new Chart(vCtx, {
        type: 'bar',
        data: { labels, datasets: [{ data: data.map(v => v * Math.random() * 10), backgroundColor: '#58a6ff88' }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
    });
}

function selectProduct(id) {
    currentProduct = products.find(p => p.id === id);
    renderProductList();
    updateHeader();
    updateChart();
}

function changeTimeframe(tf) {
    currentTimeframe = tf;
    document.querySelectorAll('.timeframe-btn').forEach(btn => btn.classList.toggle('active', btn.textContent === tf));
    updateChart();
}

function changeChartType(type) {
    currentChartType = type;
    document.querySelectorAll('.chart-type-btn').forEach(btn => btn.classList.toggle('active', btn.textContent.includes(type === 'line' ? 'Line' : 'Bar')));
    updateChart();
}

// 5. --- หัวใจสำคัญ: ระบบ Live Update กราฟให้ไหลเลื่อน ---
setInterval(() => {
    if (!priceChart) return;

    // สุ่มราคาใหม่ (จำลองตลาดขยับ)
    const volatility = currentProduct.price * 0.002;
    const tick = (Math.random() - 0.5) * volatility;
    currentProduct.price = Math.round((currentProduct.price + tick) * 100) / 100;
    
    // อัปเดตข้อมูลในกราฟ (ดึงหัวออก ใส่หางเข้า)
    const labels = priceChart.data.labels;
    const priceData = priceChart.data.datasets[0].data;

    labels.shift();
    labels.push(new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' }));
    
    priceData.shift();
    priceData.push(currentProduct.price);

    // คำนวณเส้นเฉลี่ยใหม่
    priceChart.data.datasets[1].data = calculateMA(priceData, 7);
    priceChart.data.datasets[2].data = calculateMA(priceData, 25);

    // อัปเดต Volume
    const volData = volumeChart.data.datasets[0].data;
    volData.shift();
    volData.push(Math.round(currentProduct.price * Math.random() * 5));

    // สั่งให้กราฟอัปเดตการแสดงผล
    priceChart.update('none'); // 'none' เพื่อให้มันไหลลื่นแบบ Real-time
    volumeChart.update('none');

    // อัปเดตตัวเลขในหน้าจอ
    updateHeader();
}, 2000); // ทุก 2 วินาที

// เริ่มงานครั้งแรก
renderProductList();
updateHeader();
updateChart();
</script>
