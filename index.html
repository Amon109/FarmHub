<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌾 FarmHub – กราฟราคาพืชผลไทย 🌽</title>

  <!-- ✅ ใช้ Chart.js จาก Cloudflare CDN (ปลอดภัยกับ GitHub Pages) -->
  <script src="[cdnjs.cloudflare.com](https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js)" integrity="sha512-Wn9njaEUfTuqogwO/ibKtm4iE7EkSA4YmSz9jAQjl52VlxZZjJvGLR7ApAg9OD+zxBHUCtXs27+zdFRm8+TDqA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

  <style>
    body {
      margin: 0;
      font-family: "Prompt", sans-serif;
      background-color: #f1f8f2;
      color: #333;
      text-align: center;
    }
    header {
      background: linear-gradient(90deg, #2e7d32, #81c784);
      color: white;
      padding: 15px;
      font-size: 1.5em;
      font-weight: bold;
    }
    section {
      max-width: 900px;
      margin: 20px auto;
      padding: 10px;
    }
    canvas {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin: 20px 0;
      width: 90% !important;
      max-width: 800px;
      height: 400px !important;
    }
    footer {
      background: #388e3c;
      color: #fff;
      padding: 8px 0;
      font-size: 0.9em;
    }
  </style>
</head>

<body>
  <header>🌾 FarmHub – กราฟราคาพืชผลไทย 🌽</header>

  <section>
    <h2>ราคาข้าวเปลือก (บาท/ตัน)</h2>
    <canvas id="riceChart"></canvas>

    <h2>ราคามันสำปะหลัง (บาท/กก.)</h2>
    <canvas id="cassavaChart"></canvas>

    <h2>ราคายางพารา (บาท/กก.)</h2>
    <canvas id="rubberChart"></canvas>
  </section>

  <footer>© 2024 FarmHub | ตัวอย่างข้อมูลเกษตรเพื่อสาธิต</footer>

  <script>
    const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย."];

    const datasets = {
      rice: {
        label: "ราคาข้าวเปลือก",
        data: [9500, 9700, 9400, 9800, 10100, 10400],
        borderColor: "#4CAF50",
        backgroundColor: "#A5D6A7"
      },
      cassava: {
        label: "ราคามันสำปะหลัง",
        data: [2.2, 2.0, 2.2, 2.3, 2.35, 2.4],
        borderColor: "#FF9800",
        backgroundColor: "#FFE0B2"
      },
      rubber: {
        label: "ราคายางพารา",
        data: [65, 68, 70, 67, 72, 74],
        borderColor: "#2196F3",
        backgroundColor: "#BBDEFB"
      }
    };

    function makeChart(canvasId, info) {
      const ctx = document.getElementById(canvasId);
      new Chart(ctx, {
        type: "line",
        data: {
          labels: months,
          datasets: [{
            label: info.label,
            data: info.data,
            borderColor: info.borderColor,
            backgroundColor: info.backgroundColor,
            tension: 0.3,
            fill: true,
            pointRadius: 4,
            pointBackgroundColor: info.borderColor
          }]
        },
        options: {
          plugins: {
            legend: { display: false }
          },
          scales: {
            x: { title: { display: true, text: "เดือน" }},
            y: { title: { display: true, text: "ราคา" }}
          }
        }
      });
    }

    makeChart("riceChart", datasets.rice);
    makeChart("cassavaChart", datasets.cassava);
    makeChart("rubberChart", datasets.rubber);
  </script>
</body>
</html>
