<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌾 FarmHub – กราฟราคาพืชผลไทย</title>

  <!-- โหลด Chart.js จาก jsDelivr (รองรับบน GitHub Pages แน่นอน) -->
  <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js)"></script>

  <style>
    body {
      margin: 0;
      font-family: "Prompt", sans-serif;
      background-color: #f1f8f2;
      color: #333;
      text-align: center;
    }
    header {
      background: #2e7d32;
      color: white;
      padding: 15px;
      font-size: 1.6em;
      font-weight: bold;
    }
    section {
      max-width: 900px;
      margin: 20px auto;
      padding: 10px;
    }
    canvas {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin: 30px auto;
      width: 90% !important;
      max-width: 800px;
      height: 400px !important;
    }
    footer {
      background: #388e3c;
      color: white;
      padding: 10px 0;
      font-size: 0.9em;
    }
  </style>
</head>

<body>
  <header>🌾 FarmHub – กราฟราคาพืชผลไทย 🌽</header>

  <section>
    <h2>ราคาข้าวเปลือก (บาท/ตัน)</h2>
    <canvas id="riceChart"></canvas>

    <h2>ราคามันสำปะหลัง (บาท/กก.)</h2>
    <canvas id="cassavaChart"></canvas>

    <h2>ราคายางพารา (บาท/กก.)</h2>
    <canvas id="rubberChart"></canvas>
  </section>

  <footer>© 2024 FarmHub | ตัวอย่างข้อมูลเกษตรเพื่อสาธิต</footer>

  <script>
    const months = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย."];

    const datasets = {
      rice: {
        label: "ราคาข้าวเปลือก",
        data: [9500, 9700, 9400, 9800, 10100, 10400],
        borderColor: "#4CAF50",
        backgroundColor: "#A5D6A733"
      },
      cassava: {
        label: "ราคามันสำปะหลัง",
        data: [2.2, 2.0, 2.15, 2.3, 2.35, 2.4],
        borderColor: "#FF9800",
        backgroundColor: "#FFE0B233"
      },
      rubber: {
        label: "ราคายางพารา",
        data: [65, 68, 70, 67, 72, 74],
        borderColor: "#2196F3",
        backgroundColor: "#BBDEFB33"
      }
    };

    function drawChart(canvasId, dataset) {
      new Chart(document.getElementById(canvasId).getContext("2d"), {
        type: "line",
        data: {
          labels: months,
          datasets: [{
            label: dataset.label,
            data: dataset.data,
            borderColor: dataset.borderColor,
            backgroundColor: dataset.backgroundColor,
            fill: true,
            tension: 0.3,
            pointRadius: 5,
            pointBackgroundColor: dataset.borderColor
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {display: false}
          },
          scales: {
            x: {title: {display: true, text: "เดือน"}},
            y: {title: {display: true, text: "ราคา"}}
          }
        }
      });
    }

    // สร้างกราฟแต่ละชนิด
    drawChart("riceChart", datasets.rice);
    drawChart("cassavaChart", datasets.cassava);
    drawChart("rubberChart", datasets.rubber);
  </script>
</body>
</html>
